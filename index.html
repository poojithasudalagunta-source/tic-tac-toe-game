<!DOCTYPE html>
<html>
<head>
<title>Tic Tac Toe</title>

<style>

body{
    font-family: Arial;
    text-align:center;
    background:#0f172a;
    color:white;
}

h1{
    margin-top:20px;
}

.board{
    display:grid;
    grid-template-columns:repeat(3,110px);
    gap:10px;
    justify-content:center;
    margin-top:30px;
}

.cell{
    width:110px;
    height:110px;
    background:#1e293b;
    font-size:45px;
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    border-radius:12px;
    transition:0.3s;
}

.cell:hover{
    background:#334155;
}

.x{
    color:#ef4444;
}

.o{
    color:#3b82f6;
}

.win{
    animation: winGlow 0.8s infinite alternate;
}

@keyframes winGlow{
    from{
        box-shadow:0 0 10px #22c55e;
        transform:scale(1);
    }
    to{
        box-shadow:0 0 30px #22c55e;
        transform:scale(1.1);
    }
}

#status{
    margin-top:25px;
    font-size:22px;
}

button{
    margin-top:20px;
    padding:12px 25px;
    font-size:16px;
    border:none;
    border-radius:8px;
    background:#22c55e;
    color:white;
    cursor:pointer;
}

button:hover{
    background:#16a34a;
}

</style>
</head>

<body>

<h1>🎮 Tic Tac Toe</h1>

<div class="board">

<div class="cell" onclick="play(this,0)"></div>
<div class="cell" onclick="play(this,1)"></div>
<div class="cell" onclick="play(this,2)"></div>

<div class="cell" onclick="play(this,3)"></div>
<div class="cell" onclick="play(this,4)"></div>
<div class="cell" onclick="play(this,5)"></div>

<div class="cell" onclick="play(this,6)"></div>
<div class="cell" onclick="play(this,7)"></div>
<div class="cell" onclick="play(this,8)"></div>

</div>

<div id="status">Player X's turn</div>

<button onclick="resetGame()">Restart</button>

<script>

let board = ["","","","","","","","",""];
let currentPlayer = "X";
let gameActive = true;

const winPatterns = [
[0,1,2],
[3,4,5],
[6,7,8],
[0,3,6],
[1,4,7],
[2,5,8],
[0,4,8],
[2,4,6]
];

function play(cell,index){

if(board[index] !== "" || !gameActive) return;

board[index] = currentPlayer;
cell.innerText = currentPlayer;

if(currentPlayer === "X"){
cell.classList.add("x");
}else{
cell.classList.add("o");
}

checkWinner();

if(gameActive){
currentPlayer = currentPlayer === "X" ? "O" : "X";
document.getElementById("status").innerText = "Player " + currentPlayer + "'s turn";
}

}

function checkWinner(){

for(let pattern of winPatterns){

let a = pattern[0];
let b = pattern[1];
let c = pattern[2];

if(board[a] && board[a] === board[b] && board[a] === board[c]){

let cells = document.querySelectorAll(".cell");

cells[a].classList.add("win");
cells[b].classList.add("win");
cells[c].classList.add("win");

document.getElementById("status").innerHTML =
"🎉 Player " + board[a] + " WON! <br> Click Restart to play again";

gameActive = false;
return;

}

}

if(!board.includes("")){
document.getElementById("status").innerText = "It's a Draw!";
gameActive = false;
}

}

function resetGame(){

board = ["","","","","","","","",""];
currentPlayer = "X";
gameActive = true;

document.querySelectorAll(".cell").forEach(cell=>{
cell.innerText="";
cell.classList.remove("x","o","win");
});

document.getElementById("status").innerText="Player X's turn";

}

</script>

</body>
</html>
